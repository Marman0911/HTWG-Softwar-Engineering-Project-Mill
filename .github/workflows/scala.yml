name: Scala CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Run tests with coverage
        run: sbt clean coverage test coverageReport

      - name: Resolve coverage report path
        run: |
          COVERAGE_FILE=$(find target -type f -path "*/coverage-report/cobertura.xml" | head -n 1)
          if [ -z "$COVERAGE_FILE" ]; then
            echo "No cobertura.xml found under target/."
            find target -maxdepth 4 -type f | sort
            exit 1
          fi
          echo "Using coverage file: $COVERAGE_FILE"
          echo "COVERAGE_FILE=$COVERAGE_FILE" >> "$GITHUB_ENV"

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.COVERAGE_FILE }}
          format: cobertura
          debug: true